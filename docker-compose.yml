version: '3.8'

services:
  web:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://ripple_user:ripple_pass@db:5432/ripplealert
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build: .
    command: python fetcher.py
    environment:
      - DATABASE_URL=postgresql://ripple_user:ripple_pass@db:5432/ripplealert
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  alert-engine:
    build: .
    command: python alert_engine.py
    environment:
      - DATABASE_URL=postgresql://ripple_user:ripple_pass@db:5432/ripplealert
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=ripple_user
      - POSTGRES_PASSWORD=ripple_pass
      - POSTGRES_DB=ripplealert
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ripple_user -d ripplealert"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
