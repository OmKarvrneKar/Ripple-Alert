name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      # Since we don't have pytest tests yet, we'll just check syntax/imports.
      # In the future, pytest could be added here.
      - name: Basic Syntax Check
        run: |
          python -m py_compile main.py
          python -m py_compile fetcher.py
          python -m py_compile alert_engine.py

      - name: Trigger Render Deploy
        # Only deploy if previous steps succeeded
        if: success()
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          else
            echo "RENDER_DEPLOY_HOOK secret not set. Skipping deployment."
          fi
