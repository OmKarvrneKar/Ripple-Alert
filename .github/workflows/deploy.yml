name: Deploy to Render

on:
  push:
    branches:
      - main

jobs:
  test_and_deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Run Pytest Suite via Docker
      run: |
        docker compose build
        docker compose up -d db redis
        
        # Wait for DB to be healthy
        echo "Waiting for database to be ready..."
        sleep 10
        
        # Run pytest inside the web container
        docker compose run --rm web /bin/sh -c "pip install -r requirements-dev.txt && pytest"
        
    - name: Trigger Render Deploy Hook
      if: success()
      env:
        RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
      run: |
        if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Deploy triggered successfully."
        else
          echo "RENDER_DEPLOY_HOOK_URL secret not set. Skipping deployment."
        fi
